<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Private Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>Your ID: <span id="my-id">Loading...</span></h2>
        
        <div class="setup-area">
            <input type="text" id="join-id" placeholder="Enter Friend's ID">
            <button onclick="connectToPeer()" class="btn-connect">Connect</button>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="btn-send">Send</button>
        </div>

        <button onclick="clearHistory()" class="btn-clear">Clear History</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
