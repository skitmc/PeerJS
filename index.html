<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerChat Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="app-container" id="app-bg">
        <div class="sidebar">
            <div class="profile-section">
                <input type="text" id="user-name" placeholder="Your Name" onchange="saveProfile()">
                <div class="my-code-row">
                    <span id="my-id">Generating...</span>
                    <button onclick="regenerateID()" title="Regenerate Code">🔄</button>
                </div>
            </div>

            <div class="actions">
                <input type="text" id="join-id" placeholder="Friend's Code">
                <button onclick="connectToPeer()">+ Add Chat</button>
            </div>

            <div id="contact-list" class="contact-list">
                </div>

            <div class="settings">
                <input type="color" id="bg-color" onchange="updateBackground(this.value)">
                <button onclick="clearAllData()" class="danger-btn">Nuke All Chats</button>
            </div>
        </div>

        <div class="chat-area">
            <div id="chat-header">Select a chat to start</div>
            <div id="message-display"></div>
            <div class="input-row">
                <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
